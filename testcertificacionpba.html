<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test de Certificación PBA v2.2 — Liberty Finance</title>
<style>
  :root {
    --navy: #0B2545;
    --navy-deep: #071A33;
    --blue: #13315C;
    --accent: #8DA9C4;
    --gold: #C8A560;
    --gold-dark: #A8883F;
    --bg: #F7F8FA;
    --card: #FFFFFF;
    --text: #111827;
    --muted: #6B7280;
    --border: #D1D5DB;
    --border-soft: #E5E7EB;
    --green: #1F7A3A;
    --green-bg: #E8F5EC;
    --red: #B23A48;
    --red-bg: #FBEAEC;
    --amber: #B45309;
    --amber-bg: #FEF3C7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; }
  .hidden { display: none !important; }

  /* WELCOME */
  #welcome-screen {
    min-height: 100vh;
    background: linear-gradient(140deg, var(--navy-deep) 0%, var(--navy) 50%, var(--blue) 100%);
    color: #fff;
    padding: 32px 20px 60px;
    display: flex; align-items: center; justify-content: center;
  }
  .welcome-container { max-width: 1000px; width: 100%; }
  .brand-row { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .brand-mark {
    width: 46px; height: 46px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: Georgia, serif; font-size: 22px; color: var(--gold); font-weight: 700;
  }
  .brand-text { line-height: 1.15; }
  .brand-text .name { font-size: 17px; letter-spacing: 4px; font-weight: 700; color: #fff; }
  .brand-text .name-sub { font-size: 17px; letter-spacing: 4px; font-weight: 700; color: var(--gold); }
  .tagline {
    font-size: 12px; letter-spacing: 2px; color: var(--accent);
    text-transform: uppercase; margin-bottom: 8px;
  }
  .hero-title {
    font-size: 42px; color: #fff; font-weight: 800;
    letter-spacing: -1px; line-height: 1.1; margin: 0 0 12px;
  }
  .hero-sub { color: var(--accent); font-size: 15px; max-width: 640px; margin: 0 0 8px; }
  .legacy-line {
    font-family: Georgia, serif; font-style: italic; color: var(--gold);
    font-size: 15px; margin: 0 0 28px;
  }
  .blocker-banner {
    background: rgba(178, 58, 72, 0.18);
    border: 1px solid rgba(178, 58, 72, 0.5);
    color: #FEE2E2;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    margin: 0 0 24px;
    max-width: 720px;
    letter-spacing: 0.3px;
  }
  .blocker-banner strong { color: #fff; }
  .hero-badges { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px; }
  .badge {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(200,165,96,0.3);
    padding: 8px 14px; border-radius: 20px;
    font-size: 12px; color: #fff; letter-spacing: 0.3px;
  }
  .badge strong { color: var(--gold); font-weight: 700; }
  .split-summary {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 36px; max-width: 720px;
  }
  .split-item {
    background: rgba(255,255,255,0.05);
    border-left: 3px solid var(--gold);
    padding: 16px 18px; border-radius: 4px;
  }
  .split-item .big-num {
    font-size: 38px; font-weight: 800; color: var(--gold);
    line-height: 1; margin-bottom: 4px;
  }
  .split-item .big-num small { font-size: 22px; color: rgba(200,165,96,0.55); }
  .split-item .big-lbl { font-size: 13px; color: #fff; font-weight: 600; }
  .split-item .big-desc { font-size: 12px; color: var(--accent); margin-top: 2px; }
  .threshold-bar {
    background: rgba(31, 122, 58, 0.15);
    border-left: 3px solid var(--green);
    padding: 14px 18px;
    margin: 0 0 36px;
    max-width: 720px;
    font-size: 13.5px;
    color: #DCFCE7;
    border-radius: 4px;
  }
  .threshold-bar strong { color: #fff; }
  .role-prompt {
    font-size: 13px; letter-spacing: 1.5px; color: var(--accent);
    text-transform: uppercase; font-weight: 600; margin-bottom: 14px;
  }
  .role-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 720px; }
  .role-card {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(141,169,196,0.25);
    border-radius: 10px; padding: 24px;
    cursor: pointer; transition: all 0.18s ease;
    text-align: left; display: block; width: 100%;
  }
  .role-card:hover {
    border-color: var(--gold);
    background: rgba(200,165,96,0.06);
    transform: translateY(-2px);
  }
  .role-card .icon { font-size: 28px; margin-bottom: 10px; }
  .role-card h3 { font-size: 17px; color: #fff; margin: 0 0 6px; font-weight: 700; }
  .role-card p { font-size: 13px; color: var(--accent); margin: 0 0 12px; line-height: 1.5; }
  .role-card .arrow { color: var(--gold); font-size: 18px; font-weight: 700; }
  .results-link { margin-top: 20px; color: var(--accent); font-size: 13px; max-width: 720px; }
  .results-link button { color: var(--gold); text-decoration: underline; font-size: 13px; padding: 0; }

  /* FORM */
  #form-screen, #coach-form-screen {
    min-height: 100vh; background: var(--bg);
    padding: 48px 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .form-card {
    background: #fff; max-width: 540px; width: 100%;
    padding: 36px 40px 32px; border-radius: 10px;
    box-shadow: 0 10px 40px rgba(11,37,69,0.08);
  }
  .form-card .back-link {
    color: var(--muted); font-size: 13px; margin-bottom: 20px;
    display: inline-block; cursor: pointer;
  }
  .form-card .back-link:hover { color: var(--navy); }
  .form-card h2 { margin: 0 0 8px; color: var(--navy); font-size: 22px; font-weight: 700; }
  .form-card .sub { color: var(--muted); font-size: 13.5px; margin: 0 0 24px; }
  .form-field { margin-bottom: 16px; }
  .form-field label {
    display: block; font-size: 12.5px; font-weight: 600;
    color: var(--navy); margin-bottom: 6px; letter-spacing: 0.3px;
  }
  .form-field input, .form-field select, .form-field textarea {
    width: 100%; padding: 10px 12px;
    border: 1.5px solid var(--border); border-radius: 6px;
    font-size: 14px; color: var(--text); background: #fff;
    transition: border-color 0.15s;
  }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
    outline: none; border-color: var(--navy);
  }
  .modo-aplicacion {
    background: var(--amber-bg);
    border-left: 3px solid var(--amber);
    padding: 10px 14px;
    margin: 0 0 18px;
    font-size: 13px;
    color: #78350F;
    border-radius: 3px;
  }
  .form-buttons { display: flex; gap: 10px; margin-top: 24px; }
  .btn-primary {
    background: var(--navy); color: #fff;
    padding: 11px 22px; border-radius: 6px;
    font-size: 14.5px; font-weight: 600; letter-spacing: 0.3px;
    transition: background 0.15s; flex: 1;
  }
  .btn-primary:hover { background: var(--blue); }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
  .btn-secondary {
    background: #fff; color: var(--navy);
    border: 1.5px solid var(--border);
    padding: 11px 22px; border-radius: 6px;
    font-size: 14.5px; font-weight: 600;
  }
  .btn-secondary:hover { border-color: var(--navy); }

  /* TEST */
  #test-screen { min-height: 100vh; display: flex; flex-direction: column; }
  .test-header {
    background: var(--navy); color: #fff;
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .th-left { display: flex; flex-direction: column; }
  .th-title { font-size: 14px; font-weight: 700; color: #fff; }
  .th-asesor { font-size: 12px; color: var(--accent); }
  .th-mode {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-left: 6px;
  }
  .th-mode.simulacro { background: var(--amber); color: #fff; }
  .th-mode.oficial { background: var(--red); color: #fff; }
  .th-center { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .progress-pill {
    background: rgba(255,255,255,0.1);
    padding: 6px 14px; border-radius: 20px;
    font-size: 12.5px; color: #fff;
  }
  .progress-pill strong { color: var(--gold); font-weight: 700; }
  .timer {
    background: rgba(200,165,96,0.15);
    border: 1px solid var(--gold);
    padding: 6px 14px; border-radius: 6px;
    font-family: 'SF Mono', Consolas, Monaco, monospace;
    font-size: 15px; font-weight: 700; letter-spacing: 1px;
    color: var(--gold); min-width: 90px; text-align: center;
  }
  .timer.warning { background: rgba(180, 83, 9, 0.35); border-color: #F59E0B; color: #FEF3C7; }
  .timer.critical { background: rgba(178, 58, 72, 0.45); border-color: var(--red); color: #FEE2E2; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }
  .progress-rail { height: 3px; background: rgba(255,255,255,0.12); }
  .progress-rail .fill { height: 100%; background: var(--gold); transition: width 0.3s ease; }
  .section-tabs {
    background: #fff; border-bottom: 1px solid var(--border-soft);
    padding: 0 24px;
    display: flex; gap: 2px; overflow-x: auto;
    position: sticky; top: 0; z-index: 5;
  }
  .section-tab {
    padding: 14px 18px; border-bottom: 3px solid transparent;
    font-size: 13px; font-weight: 600; color: var(--muted);
    white-space: nowrap; transition: all 0.15s;
  }
  .section-tab:hover { color: var(--navy); }
  .section-tab.active { color: var(--navy); border-bottom-color: var(--gold); }
  .section-tab .count {
    font-size: 11px; background: var(--bg);
    padding: 1px 6px; border-radius: 10px;
    color: var(--muted); margin-left: 6px; font-weight: 600;
  }
  .section-tab.active .count { background: var(--navy); color: #fff; }
  .test-body { flex: 1; max-width: 880px; margin: 0 auto; width: 100%; padding: 28px 32px 140px; }
  .question-card {
    background: #fff; border-radius: 10px;
    padding: 24px 28px; margin-bottom: 18px;
    box-shadow: 0 1px 3px rgba(11,37,69,0.04);
    border: 1px solid var(--border-soft);
  }
  .q-head-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .q-num-tag {
    background: var(--navy); color: #fff;
    padding: 4px 10px; border-radius: 4px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
  }
  .q-module-tag {
    background: var(--gold); color: var(--navy);
    padding: 3px 9px; border-radius: 3px;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
  }
  .q-points-tag {
    background: var(--bg); color: var(--navy);
    padding: 3px 9px; border-radius: 3px;
    font-size: 11px; font-weight: 700; margin-left: auto;
  }
  .q-v22-tag {
    background: #DCFCE7; color: #14532D;
    padding: 3px 9px; border-radius: 3px;
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.5px;
  }
  .q-text {
    font-size: 16px; color: var(--text); font-weight: 500;
    margin: 4px 0 16px; line-height: 1.5;
  }
  .q-scenario {
    background: #EFF6FB; border-left: 3px solid var(--accent);
    padding: 10px 14px; margin: 0 0 16px;
    font-size: 13.5px; color: #1F2937;
    font-style: italic; border-radius: 2px;
  }
  .options-list { list-style: none; padding: 0; margin: 0; }
  .option {
    padding: 13px 16px 13px 48px;
    border: 1.5px solid var(--border); border-radius: 8px;
    margin-bottom: 8px; cursor: pointer;
    position: relative; transition: all 0.12s;
    font-size: 14.5px; line-height: 1.5; color: var(--text);
  }
  .option:hover { border-color: var(--accent); background: #FAFBFC; }
  .option.selected {
    border-color: var(--navy); background: #F0F4FA;
    border-width: 2px; padding: 12px 15px 12px 47px;
  }
  .option::before {
    content: ""; position: absolute;
    left: 18px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px;
    border: 2px solid var(--muted); border-radius: 50%;
    background: #fff; transition: all 0.12s;
  }
  .option.selected::before {
    border-color: var(--navy); background: var(--navy);
    box-shadow: inset 0 0 0 3px #fff;
  }
  .option .letter { font-weight: 700; color: var(--navy); margin-right: 6px; }
  .open-textarea {
    width: 100%; min-height: 200px;
    padding: 14px 16px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 14.5px; resize: vertical;
    line-height: 1.55; color: var(--text);
  }
  .open-textarea:focus { outline: none; border-color: var(--navy); }
  .textarea-meta {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted); margin-top: 6px;
  }
  .test-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff; border-top: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; z-index: 10;
    box-shadow: 0 -4px 12px rgba(11,37,69,0.06);
  }
  .footer-status { font-size: 13px; color: var(--muted); }
  .footer-status strong { color: var(--navy); }
  .btn-finish {
    background: var(--gold); color: var(--navy);
    padding: 11px 22px; border-radius: 6px;
    font-size: 14.5px; font-weight: 700; letter-spacing: 0.3px;
    transition: background 0.15s;
  }
  .btn-finish:hover { background: var(--gold-dark); color: #fff; }
  .btn-finish:disabled { background: var(--muted); color: #fff; cursor: not-allowed; }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(7,26,51,0.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal {
    background: #fff; max-width: 480px; width: 100%;
    padding: 28px 32px; border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }
  .modal h3 { margin: 0 0 10px; color: var(--navy); font-size: 20px; }
  .modal p { color: #374151; font-size: 14px; margin: 0 0 16px; }
  .modal .status-list {
    background: var(--bg); padding: 12px 14px;
    border-radius: 6px; font-size: 13.5px; margin-bottom: 18px;
  }
  .modal .status-list div { padding: 2px 0; display: flex; justify-content: space-between; }
  .modal .status-list strong { color: var(--navy); }
  .modal-buttons { display: flex; gap: 10px; }
  .modal-buttons button { flex: 1; padding: 11px 16px; }

  /* RESULT */
  #result-screen { background: var(--bg); min-height: 100vh; padding: 36px 20px 80px; }
  .result-wrap { max-width: 920px; margin: 0 auto; }
  .result-card {
    background: #fff; border-radius: 10px;
    padding: 36px 44px; box-shadow: 0 1px 4px rgba(11,37,69,0.05);
    margin-bottom: 20px;
  }
  .result-header {
    text-align: center; padding-bottom: 24px;
    border-bottom: 1px solid var(--border-soft); margin-bottom: 28px;
  }
  .result-header .brand-mini {
    font-size: 11px; letter-spacing: 2px;
    color: var(--gold); font-weight: 700;
  }
  .result-header h1 { margin: 8px 0 4px; color: var(--navy); font-size: 24px; font-weight: 700; }
  .result-header .meta-line { color: var(--muted); font-size: 14px; }
  .result-header .mode-badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 3px; font-size: 11px;
    font-weight: 700; letter-spacing: 1px;
    margin-top: 8px;
  }
  .result-header .mode-badge.simulacro { background: var(--amber); color: #fff; }
  .result-header .mode-badge.oficial { background: var(--red); color: #fff; }
  .score-grid {
    display: grid; grid-template-columns: 1.2fr 1fr 1fr;
    gap: 16px; margin-bottom: 28px;
  }
  .score-big {
    background: var(--navy); color: #fff;
    border-radius: 10px; padding: 24px; text-align: center;
  }
  .score-big .lbl {
    font-size: 11px; letter-spacing: 1.5px;
    color: var(--accent); text-transform: uppercase; font-weight: 700;
  }
  .score-big .val {
    font-size: 52px; font-weight: 800;
    color: var(--gold); line-height: 1;
    margin: 6px 0 2px; letter-spacing: -1.5px;
  }
  .score-big .val small { font-size: 22px; color: rgba(200,165,96,0.55); font-weight: 600; }
  .score-big .pct { font-size: 16px; color: #fff; font-weight: 600; }
  .score-tile {
    background: #fff; border: 1px solid var(--border-soft);
    border-radius: 10px; padding: 18px; text-align: center;
  }
  .score-tile .lbl {
    font-size: 11px; letter-spacing: 1px; color: var(--muted);
    text-transform: uppercase; font-weight: 700;
  }
  .score-tile .val { font-size: 28px; font-weight: 700; color: var(--navy); margin: 4px 0 0; }
  .score-tile .sub { font-size: 12px; color: var(--muted); }
  .score-tile.pending { background: var(--amber-bg); border-color: #FCD34D; }
  .score-tile.pending .val { color: var(--amber); }
  .verdict-band {
    margin-top: 4px; padding: 18px 22px;
    border-radius: 8px;
    border-left: 4px solid var(--gold); background: #FFFBF0;
    font-size: 14.5px;
  }
  .verdict-band.pass { border-left-color: var(--green); background: var(--green-bg); color: #14532D; }
  .verdict-band.borderline { border-left-color: var(--amber); background: var(--amber-bg); color: #78350F; }
  .verdict-band.fail { border-left-color: var(--red); background: var(--red-bg); color: #7F1D1D; }
  .verdict-band .verdict-title {
    font-size: 16px; font-weight: 800; margin-bottom: 4px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .verdict-band .verdict-detail { font-size: 14px; }
  .strict-notice {
    background: #FFF7ED;
    border: 1px solid #FDBA74;
    color: #9A3412;
    padding: 12px 16px;
    border-radius: 6px;
    margin: 16px 0 0;
    font-size: 13px;
    line-height: 1.55;
  }
  .strict-notice strong { color: #7C2D12; }
  .section-title {
    font-size: 13px; letter-spacing: 1.5px;
    color: var(--navy); text-transform: uppercase; font-weight: 700;
    margin: 32px 0 14px; padding-bottom: 6px;
    border-bottom: 2px solid var(--navy);
  }
  .mcr {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-left: 4px solid var(--border-soft);
    margin-bottom: 5px; background: #FAFBFC;
    font-size: 13.5px; border-radius: 2px;
  }
  .mcr.ok { border-left-color: var(--green); background: var(--green-bg); }
  .mcr.bad { border-left-color: var(--red); background: var(--red-bg); }
  .mcr .qref { font-weight: 700; color: var(--navy); min-width: 44px; }
  .mcr .tag {
    font-size: 10.5px; background: var(--navy); color: #fff;
    padding: 2px 6px; border-radius: 3px; font-weight: 700; letter-spacing: 0.5px;
  }
  .mcr .given { flex: 1; color: #374151; }
  .mcr .given strong { color: var(--navy); }
  .mcr .mark { font-weight: 700; font-size: 18px; }
  .mcr.ok .mark { color: var(--green); }
  .mcr.bad .mark { color: var(--red); }
  .open-review {
    background: #FFFBF0; border-left: 4px solid var(--gold);
    padding: 16px 20px; border-radius: 4px; margin-bottom: 14px;
  }
  .open-review .head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
  }
  .open-review .qref { font-weight: 700; color: var(--navy); font-size: 14px; }
  .open-review .qtext {
    color: #374151; font-size: 13.5px;
    margin: 0 0 10px; font-style: italic;
  }
  .open-review .answer-box {
    background: #fff; border: 1px solid var(--border-soft);
    padding: 12px 14px; border-radius: 6px;
    font-size: 13.5px; color: var(--text);
    white-space: pre-wrap; line-height: 1.55;
  }
  .open-review .answer-box.empty { color: var(--muted); font-style: italic; }
  .coach-score-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 10px; font-size: 13px; flex-wrap: wrap;
  }
  .coach-score-row label { color: var(--navy); font-weight: 600; }
  .coach-score-row input {
    width: 70px; padding: 6px 8px;
    border: 1.5px solid var(--border); border-radius: 5px;
    font-size: 13px; text-align: center;
  }

const DURATION_MIN = 90;
const STORAGE_KEY = 'lf_pba_certification_v22';
const PASS_THRESHOLD = 0.70;
const EXCELLENT_THRESHOLD = 0.85;

let state = {
  screen: 'welcome', role: null,
  student: { name: '', track: '', level: '', date: '', mode: 'oficial' },
  answers: {}, coachScores: {},
  currentSection: 'S1',
  startedAt: null, finishedAt: null, elapsed: 0,
  timerExpired: false
};
let timerInterval = null;

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      ...state,
      elapsed: state.startedAt ? Math.floor((Date.now() - state.startedAt) / 1000) : 0
    }));
  } catch (e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}
function clearState() { try { localStorage.removeItem(STORAGE_KEY); } catch (e) {} }

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!state.startedAt) return;
    const totalSecs = DURATION_MIN * 60;
    const elapsedSecs = Math.floor((Date.now() - state.startedAt) / 1000);
    const remaining = totalSecs - elapsedSecs;
    const el = document.getElementById('timer-display');
    if (el) {
      if (remaining <= 0) {
        el.textContent = '00:00';
        el.classList.add('critical');
        state.timerExpired = true;
        clearInterval(timerInterval);
        autoFinishTest();
        return;
      }
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      el.classList.toggle('warning', remaining < 600 && remaining >= 120);
      el.classList.toggle('critical', remaining < 120);
    }
  }, 1000);
}

const LETTERS = ['A','B','C','D','E'];
function esc(s) {
  return (s == null ? '' : String(s)).replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function countAnswered(section) {
  const qs = QUESTIONS.filter(q => !section || q.section === section);
  return qs.filter(q => {
    const a = state.answers[q.id];
    return q.type === 'mc' ? !!a : (a && a.trim().length > 10);
  }).length;
}
function countTotal(section) { return QUESTIONS.filter(q => !section || q.section === section).length; }

function calcMCScore() {
  let correct = 0, total = 0;
  const details = [];
  QUESTIONS.filter(q => q.type === 'mc').forEach(q => {
    total++;
    const given = state.answers[q.id];
    const ok = given === q.correct;
    if (ok) correct++;
    details.push({ id: q.id, module: q.module, given: given || '—', correct: q.correct, ok });
  });
  return { correct, total, pointsEarned: correct, pointsMax: total, details };
}

function calcOpenScore() {
  let earned = 0, max = 0, rated = 0;
  const details = [];
  QUESTIONS.filter(q => q.type === 'open').forEach(q => {
    max += q.maxPoints;
    const score = state.coachScores[q.id];
    if (typeof score === 'number' && !isNaN(score)) { earned += score; rated++; }
    details.push({ id: q.id, module: q.module, maxPoints: q.maxPoints, score });
  });
  const allRated = rated === QUESTIONS.filter(q => q.type === 'open').length;
  return { earned, max, rated, total: QUESTIONS.filter(q => q.type === 'open').length, allRated, details };
}

function fmtDuration(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m} min ${String(s).padStart(2,'0')} s`;
}

function selectMC(qId, letter) {

function updateHeaderCounters() {
  const answered = countAnswered();

  const pct = Math.round((answered / total) * 100);
  const pill = document.querySelector('.progress-pill');
  if (pill) pill.innerHTML = `Respondidas: <strong>${answered}</strong> / ${total}`;
  const fill = document.querySelector('.progress-rail .fill');
  if (fill) fill.style.width = `${pct}%`;
  const footer = document.querySelector('.footer-status');
  if (footer) footer.innerHTML = `Sección <strong>${state.currentSection}</strong> · ${countAnswered(state.currentSection)} / ${countTotal(state.currentSection)} · Total <strong>${answered}/${total}</strong>`;
  SECTIONS.forEach(s => {
    const done = countAnswered(s.id);
    const tot = countTotal(s.id);
    document.querySelectorAll('.section-tab').forEach(b => {
      if (b.textContent.startsWith(s.id + ' ')) {

        if (c) c.textContent = `${done}/${tot}`;

  });

  else { num = Math.max(0, Math.min(q.maxPoints, num)); state.coachScores[qId] = num; }
  saveState();
  render();
}

}

/* COACH IMPORT */
function renderCoachImport() {
  document.getElementById('app').innerHTML = `
    <div id="coach-form-screen">
      <div class="form-card">
        <span class="back-link" onclick="backToWelcome()">← Volver</span>
        <h2>Modo Coach — cargar respuestas</h2>
        <p class="sub">Pegá el JSON del test que entregó el asesor (descargado con "Descargar JSON") o subí el archivo. Vas a calificar las 4 abiertas con criterio estricto + aplicación de RED FLAGS.</p>

        <div class="import-box">
          <label style="display:block; font-size:12.5px; font-weight:600; color:var(--navy); margin-bottom:8px; letter-spacing:0.3px;">Subir archivo .json</label>
          <input type="file" accept="application/json,.json" onchange="loadJSONFile(event)">
          <div style="margin:16px 0 8px; color:var(--muted); font-size:12px;">— o pegar el contenido —</div>
          <textarea id="coach-json" placeholder='{"student":{...},"answers":{...},...}'></textarea>
        </div>

        <div class="form-buttons">
          <button class="btn-secondary" onclick="backToWelcome()">Cancelar</button>
          <button class="btn-primary" onclick="loadCoachJSON()">Cargar y calificar →</button>
        </div>
      </div>
    </div>
  `;
}

function loadJSONFile(ev) {
  const f = ev.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => { document.getElementById('coach-json').value = e.target.result; };
  reader.readAsText(f);
}

function loadCoachJSON() {
  const txt = document.getElementById('coach-json').value.trim();
  if (!txt) { alert('Pegá el JSON o subí el archivo primero.'); return; }
  try {
    const data = JSON.parse(txt);
    if (!data.answers || !data.student) throw new Error('Formato inválido');
    state.student = data.student;
    state.answers = data.answers;
    state.coachScores = data.coachScores || {};
    state.startedAt = data.startedAt || null;
    state.finishedAt = data.finishedAt || null;
    state.elapsed = data.elapsed || 0;
    state.role = 'coach';
    state.screen = 'result';
    saveState();
    render();
  } catch (e) { alert('Error al parsear el JSON: ' + e.message); }
}

/* EXPORT */
function buildExportJSON() {
  const mc = calcMCScore();
  const open = calcOpenScore();
  const total = mc.pointsEarned + open.earned;
  const max = mc.pointsMax + open.max;
  const pct = max ? total / max : 0;
  let verdict = 'pendiente';
  if (open.allRated) {
    if (pct >= EXCELLENT_THRESHOLD) verdict = 'certifica_excelente';
    else if (pct >= PASS_THRESHOLD) verdict = 'certifica_aprobado';
    else verdict = 'no_certifica';
  }
  return {
    meta: {
      title: 'Test de Certificación PBA',
      version: 'v2.2',
      programVersion: 'PBA Onboarding Program v2.2 (Abril 2026)',
      company: 'Liberty Finance',
      generatedAt: new Date().toISOString()
    },
    student: state.student,
    startedAt: state.startedAt,
    finishedAt: state.finishedAt,
    elapsed: state.elapsed,
    answers: state.answers,
    coachScores: state.coachScores,
    scoring: {
      mc: { correct: mc.correct, total: mc.total, earned: mc.pointsEarned, max: mc.pointsMax, details: mc.details },
      open: { earned: open.earned, max: open.max, rated: open.rated, total: open.total, details: open.details },
      total: { earned: total, max: max, pct: Math.round(pct * 1000) / 10 },
      verdict: verdict,
      thresholds: { pass: '70%', excellent: '85%' }
    }
  };
}

function downloadJSON() {
  const data = buildExportJSON();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safe = (state.student.name || 'asesor').replace(/[^a-zA-Z0-9]+/g, '_');
  const modeTag = state.student.mode === 'simulacro' ? 'simulacro' : 'oficial';
  a.download = `test_certificacion_pba_v22_${modeTag}_${safe}_${state.student.date || 'sin_fecha'}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function downloadTXT() {
  const mc = calcMCScore();
  const open = calcOpenScore();
  const total = mc.pointsEarned + open.earned;
  const max = mc.pointsMax + open.max;
  const pct = Math.round((total/max)*100);
  let verdictTxt = 'PENDIENTE';
  if (open.allRated) {
    if (pct >= 85) verdictTxt = '✓ CERTIFICA — EXCELENTE';
    else if (pct >= 70) verdictTxt = '✓ CERTIFICA — APROBADO';
    else verdictTxt = '✗ NO CERTIFICA — RE-TEST EN 2 DÍAS';
  }

  let txt = '';
  txt += '================================================\n';
  txt += '  TEST DE CERTIFICACIÓN PBA — LIBERTY FINANCE\n';
  txt += '  v2.2 — Programa de Onboarding Abril 2026\n';
  txt += '================================================\n\n';
  txt += `Asesor:       ${state.student.name}\n`;
  txt += `Track:        ${state.student.track}\n`;
  txt += `Nivel:        ${state.student.level}\n`;
  txt += `Tipo:         ${state.student.mode === 'simulacro' ? 'SIMULACRO' : 'OFICIAL (BLOQUEANTE)'}\n`;
  txt += `Fecha:        ${state.student.date}\n`;
  txt += `Coach:        ${state.student.coach || '-'}\n`;
  txt += `Duración:     ${fmtDuration(state.elapsed)}\n\n`;
  txt += '------------------------------------------------\n';
  txt += `PUNTAJE TOTAL: ${total} / ${max} pts (${pct}%)\n`;
  txt += `VEREDICTO: ${verdictTxt}\n`;
  txt += `  Selección múltiple: ${mc.pointsEarned}/${mc.pointsMax} (${mc.correct}/${mc.total} correctas)\n`;
  txt += `  Preguntas abiertas: ${open.earned}/${open.max} (${open.rated}/${open.total} calificadas estricto)\n`;
  txt += `Umbrales: ≥70% aprueba · ≥85% excelente · <70% no certifica (BLOQUEANTE)\n`;
  txt += '------------------------------------------------\n\n';

  txt += 'DETALLE — SELECCIÓN MÚLTIPLE\n';
  mc.details.forEach(d => {
    txt += `Q${String(d.id).padStart(2,'0')} [${d.module}] Tu resp: ${d.given}  Correcta: ${d.correct}  ${d.ok ? 'OK' : 'X'}\n`;
  });
  txt += '\n';

  txt += 'PREGUNTAS ABIERTAS — RESPUESTAS\n\n';
  QUESTIONS.filter(q => q.type === 'open').forEach(q => {
    const ans = state.answers[q.id] || '(sin respuesta)';
    const score = state.coachScores[q.id];
    txt += `--- Q${q.id} [${q.module}${q.v22 ? ' · v2.2' : ''}] (${q.maxPoints} pts) ---\n`;
    txt += `${q.text}\n\n`;
    if (q.scenario) txt += `Escenario: ${q.scenario}\n\n`;
    txt += `RESPUESTA:\n${ans}\n\n`;
    txt += `Puntaje coach (estricto): ${typeof score === 'number' ? score + ' / ' + q.maxPoints : 'pendiente'}\n\n`;
  });

  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safe = (state.student.name || 'asesor').replace(/[^a-zA-Z0-9]+/g, '_');
  const modeTag = state.student.mode === 'simulacro' ? 'simulacro' : 'oficial';
  a.download = `test_certificacion_pba_v22_${modeTag}_${safe}_${state.student.date || 'sin_fecha'}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

function resetAll() {
  if (!confirm('¿Cerrar y borrar todos los datos locales? Esta acción no se puede deshacer.')) return;
  clearState();
  state = {
    screen: 'welcome', role: null,
    student: { name: '', track: '', level: '', date: '', mode: 'oficial' },
    answers: {}, coachScores: {}, currentSection: 'S1',
    startedAt: null, finishedAt: null, elapsed: 0, timerExpired: false
  };
  render();
}

function showModal(html) {
  document.getElementById('modal-root').innerHTML = `<div class="modal-backdrop"><div class="modal">${html}</div></div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

function render() {
  switch (state.screen) {
    case 'welcome': renderWelcome(); break;
    case 'form': renderForm(); break;
    case 'test': renderTest(); break;
    case 'result': renderResult(); break;
    case 'coach-import': renderCoachImport(); break;
    default: renderWelcome();
  }
}

(function init() {
  render();
  window.addEventListener('beforeunload', (e) => {
    if (state.screen === 'test') { e.preventDefault(); e.returnValue = ''; }
  });
})();
</script>
